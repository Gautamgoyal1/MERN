<!DOCTYPE html>
<html lang="en">
<head>
    <style>
        .parent {
            background-color: beige;
            border: 2px solid black;
            display: flex;              /* horizontal layout */
            justify-content: space-around;
            align-items: center;
            padding: 20px;
            gap: 20px;
            height: 500px;
            border-radius: 9%;
        }

        .child {
            border: 2px solid black;
            width: 250px;
            padding: 10px;
            text-align: center;
        }

        .child img {
            width: 100%;
            height: 180px;
            object-fit: cover;
        }
        #div1{
            background-color: papayawhip;
            border-radius: 11%;
        }
        #div2{
            background-color: peachpuff;
            border-radius: 11%;
        }
        #div3{
            background-color: palegoldenrod;
            border-radius: 11%;
        }
    </style>
</head>
<body>

    <div class="parent">

        <div class="child" id="div1">
            <img src="https://encrypted-tbn0.gstatic.com/images?q=tbn:ANd9GcQ1QFS_3z9UuW4Xl3fLdawTFHfu5eg3WUpzEeYwqeBjazB21pExY_XYnIc&s=10">

        <div id ="div2" class="child">

            <p>Flowers</p>
            <p>Lorem ipsum dolor sit amet, consectetur adipisicing elit. Laboriosam, minima.</p>
        </div>

        <div id="div3" class="child">
            <img src="https://png.pngtree.com/thumb_back/fh260/background/20230411/pngtree-nature-forest-sun-ecology-image_2256183.jpg">
            <p>Greenery</p>
            <p>Lorem ipsum, dolor sit amet consectetur adipisicing elit. Necessitatibus, a.</p>

</body>
</html>
